services:
  - type: web
    name: msirms-backend
    runtime: php
    runtimeVersion: 8.2
    buildCommand: composer install && php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: mysql
          name: msirms-db
          property: host
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: msirms
      - key: DB_USERNAME
        fromService:
          type: mysql
          name: msirms-db
          property: user
      - key: DB_PASSWORD
        fromService:
          type: mysql
          name: msirms-db
          property: password
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app

  - type: mysql
    name: msirms-db
    ipAllowList: []
    plan: starter
