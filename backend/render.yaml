services:
  - type: web
    name: msirms-backend
    runtime: php
    runtimeVersion: 8.2
    buildCommand: composer install && php artisan migrate --force || true
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: mongodb
      - key: DB_CONNECTION_STRING
        sync: false
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app
